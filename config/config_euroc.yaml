general:
    test: False
    log: True
    frames_range: [10, 3600] # -1 means all frames, 50 for tests
    save_keyframes: False
    min_solver: False
    no_stereo_constraint_in_local_ba: True # Run default solver in local BA


local_features:
    features_name: aliked # choices=['aliked', 'superpoint_open', 'superpoint', 'orb']
    resize_width: 752 # tested with 640, full 1920
    resize_height: 450 # tested with 480, full 1080
    superpoint_open:
        top_k: 500
    superpoint:
        do_resize: True
        top_k: 500
    aliked:
        model_name: "aliked-n16" # choices=['aliked-t16', 'aliked-n16', 'aliked-n16rot', 'aliked-n32'], default="aliked-n16rot"
        top_k: 1000
        scores_th: 0.2
        n_limit: 1000
    orb:
        top_k: 1000
        scaleFactor: 1.2
        nlevels: 8
        edgeThreshold: 31
        firstLevel: 0
        WTA_K: 2
        patchSize: 31
        fastThreshold: 20
    matcher: lightglue # choices=['lightglue', 'smnn']
    ratio_threshold: 0.95 # for smnn matcher

mapping:
    cameras: ["cam0", "cam1"] # Both monocular and multiview are supported
    rig_match_rule:
        - ["cam0", "cam1"]
    cameras_for_baseline_estim: ["cam0", "cam1"]
    baseline: 0.110078
    sliding_window: 10 # 10 default
    max_match_distance: 1
    max_keyframes: 1000000
    method: "custom" # choices=['with_pycolmap_reconstruct', 'custom']
    init_max_forward_motion: 0.99
    init_min_tri_angle: 0.1
    init_max_error: 100.0
    init_min_num_inliers: 30
    abs_pose_max_error: 2.0
    abs_pose_min_num_inliers: 8
    abs_pose_min_inlier_ratio: 0.01
    filter_max_reproj_error: 1.0
    filter_min_tri_angle: 0.0
    local_ba_min_tri_angle: 0.0
    tri_ignore_two_view_tracks: 0


bundle_adjustment:
    max_cost_change_px: 3.0 # For early stopping in BA
    refine_focal_length: False
    refine_principal_point: False
    refine_extra_params: False
    global_max_num_iterations: 25 # Iterations inside BA HARDCODED FOR NOW IN BA
    global_max_refinements: 10 # 10 or 5 recommended